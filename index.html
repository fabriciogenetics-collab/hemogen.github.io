<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>HEMOGEN Institute</title>

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Arial;
}

header{
background:#c40000;
padding:20px;
font-size:24px;
}

nav{
background:#111;
padding:10px;
}

nav button{
margin:5px;
padding:10px;
background:#c40000;
border:none;
color:white;
cursor:pointer;
}

.container{
padding:30px;
}

.row{
display:flex;
gap:20px;
overflow-x:auto;
}

.card{

min-width:250px;
height:140px;

background:#1c1c1c;

border-radius:10px;

display:flex;

align-items:center;

justify-content:center;

cursor:pointer;

transition:0.3s;

}

.card:hover{

transform:scale(1.05);

}

.admin{

background:#222;

padding:20px;

margin-top:20px;

}

input{

padding:10px;

margin:5px;

}

iframe{

width:100%;

height:400px;

border:none;

margin-top:20px;

}

</style>

</head>

<body>

<header>

HEMOGEN Institute

</header>

<nav>

<button onclick="openPage('login')">Login</button>

<button onclick="openPage('courses')">Cursos</button>

<button onclick="openPage('sim')">Simulador</button>

<button onclick="openPage('exam')">Prova</button>

<button onclick="openPage('cert')">Certificado</button>

<button id="adminBtn" onclick="openPage('admin')" style="display:none">

ADMIN

</button>

</nav>

<div class="container">

<div id="login">

<h2>Login</h2>

<input id="user" placeholder="nome">

<input id="pass" placeholder="senha">

<button onclick="login()">Entrar</button>

<p id="loginMsg"></p>

</div>

<div id="courses" style="display:none">

<h2>Cursos</h2>

<div class="row">

<div class="card" onclick="play()">

Citogenética Clínica

</div>

<div class="card" onclick="play()">

Biologia Molecular

</div>

<div class="card" onclick="play()">

Interpretação de Cariótipo

</div>

</div>

<div id="player"></div>

</div>

<div id="sim" style="display:none">

<h2>Simulador Clínico</h2>

<p>

Paciente com atraso intelectual e hipotonia.

</p>

<button onclick="sim('down')">

Trissomia 21

</button>

<button onclick="sim('normal')">

Cariótipo normal

</button>

<p id="simResult"></p>

</div>

<div id="exam" style="display:none">

<h2>Prova</h2>

<p>

Quantos cromossomos tem o cariótipo humano?

</p>

<button onclick="answer(46)">46</button>

<button onclick="answer(23)">23</button>

<button onclick="answer(44)">44</button>

<p id="examResult"></p>

</div>

<div id="cert" style="display:none">

<h2>Certificado</h2>

<button onclick="cert()">

Gerar certificado

</button>

<h1 id="certName"></h1>

</div>

<div id="admin" style="display:none">

<h2>Painel ADM</h2>

<div class="admin">

<h3>Criar curso</h3>

<input id="courseName" placeholder="nome do curso">

<button onclick="createCourse()">

Criar

</button>

</div>

<div class="admin">

<h3>Analytics</h3>

<p id="stats"></p>

</div>

</div>

</div>

<script>

let isAdmin=false

function openPage(page){

document.querySelectorAll(".container > div")

.forEach(d=>d.style.display="none")

document.getElementById(page).style.display="block"

}

function login(){

let u=document.getElementById("user").value

let p=document.getElementById("pass").value

if(u=="admin" && p=="hemogen123"){

isAdmin=true

document.getElementById("adminBtn").style.display="inline"

document.getElementById("loginMsg").innerText="Admin logado"

}else{

document.getElementById("loginMsg").innerText="Aluno logado"

}

}

function play(){

document.getElementById("player").innerHTML=

'<iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ"></iframe>'

}

function sim(ans){

if(ans=="down"){

document.getElementById("simResult").innerText="Correto"

}else{

document.getElementById("simResult").innerText="Revise"

}

}

function answer(v){

if(v==46){

document.getElementById("examResult").innerText="Correto"

localStorage.setItem("exam","ok")

}else{

document.getElementById("examResult").innerText="Errado"

}

}

function cert(){

if(localStorage.getItem("exam")!="ok"){

alert("Passe na prova")

return

}

document.getElementById("certName").innerText=

"Certificado HEMOGEN"

}

function createCourse(){

let name=document.getElementById("courseName").value

alert("Curso criado: "+name)

}

</script>

</body>

</html>
